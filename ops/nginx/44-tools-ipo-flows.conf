##############################################################
# Normalize ipo-flows path (no slash -> slash)
##############################################################
location = /tools/ipo-flows {
    return 301 /tools/ipo-flows/;
}

##############################################################
# IPO Flow Impact Simulator static app assets (paid only)
##############################################################
location /tools/ipo-flows/app/ {
    auth_request /_ghost_paid_proxy;
    error_page 401 =302 https://paulkedrosky.com/#/portal/signup;

    alias /srv/repos/ipo-flows/dist/;
    try_files $uri $uri/ /tools/ipo-flows/app/index.html;
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
}
